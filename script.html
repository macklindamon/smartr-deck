<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Script — Smartr Deck</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{
  width:100%;height:100%;overflow:hidden;
  font-family:'Manrope',system-ui,sans-serif;
  background:#0d0f13;color:#fff;
  user-select:none;
}

.app{display:flex;flex-direction:column;height:100vh}

/* ── Top bar ── */
.topbar{
  flex:0 0 auto;
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 32px;
  background:rgba(255,255,255,.04);
  border-bottom:1px solid rgba(255,255,255,.06);
}
.topbar-left{display:flex;align-items:center;gap:14px}
.slide-badge{
  display:inline-flex;align-items:center;justify-content:center;
  min-width:42px;height:32px;padding:0 12px;
  border-radius:8px;background:rgba(94,36,194,.35);
  font-size:15px;font-weight:800;color:#c4b5fd;
}
.slide-title{font-size:15px;font-weight:600;color:rgba(255,255,255,.5);line-height:1.3}
.topbar-right{display:flex;align-items:center;gap:20px}
.status{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:rgba(255,255,255,.25)}
.status-dot{width:8px;height:8px;border-radius:50%;background:#444;transition:background .3s}
.status-dot.connected{background:#4ade80}

/* ── Timer ── */
.slide-timer{
  font-size:15px;font-weight:700;font-variant-numeric:tabular-nums;
  color:rgba(255,255,255,.45);padding:4px 12px;border-radius:6px;
  transition:color .3s,background .3s;
}
.slide-timer.over{color:#fff;background:rgba(229,0,77,.25)}
.slide-timer.over.flash{animation:timerFlash 1s ease-in-out infinite}
@keyframes timerFlash{0%,100%{background:rgba(229,0,77,.15);color:#ff4d6d}50%{background:rgba(229,0,77,.45);color:#fff}}

/* ── Scroll container ── */
.notes-scroll{
  flex:1;overflow-y:auto;overflow-x:hidden;
  scroll-behavior:auto;
  padding:48px 0 60vh;
  position:relative;
}
.notes-inner{max-width:100%;margin:0;padding:0 48px}

/* ── Note blocks ── */
.note-block{
  margin-bottom:80px;
  padding:40px 48px;
  border-radius:20px;
  border-left:5px solid rgba(94,36,194,.15);
  background:rgba(255,255,255,.02);
  opacity:.25;
  transition:opacity .5s, border-color .5s, background .5s;
}
.note-block.active{
  opacity:1;
  border-left-color:#7c3aed;
  background:rgba(94,36,194,.06);
}
.note-block.in-view{
  opacity:.7;
  border-left-color:rgba(94,36,194,.3);
  background:rgba(255,255,255,.03);
}
.note-block.active.in-view{
  opacity:1;
  border-left-color:#7c3aed;
  background:rgba(94,36,194,.06);
}
.note-num{
  font-size:28px;font-weight:800;
  letter-spacing:.04em;color:rgba(255,255,255,.2);margin-bottom:24px;
}
.note-block.active .note-num{color:#a78bfa}
.note-body{font-size:60px;line-height:1.5;color:rgba(255,255,255,.9)}
.note-body p{margin-bottom:20px}
.note-body p:last-child{margin-bottom:0}
.note-body strong{color:#fff;font-weight:700}
.note-body em{color:#a78bfa;font-style:italic}
.note-body ul{margin:16px 0 16px 40px;list-style:none}
.note-body li{margin-bottom:12px}
.note-body li::before{content:'\2022';color:#7c3aed;font-weight:700;display:inline-block;width:40px;margin-left:-40px}

/* ── Bottom bar ── */
.bottom-bar{
  flex:0 0 auto;
  display:flex;align-items:center;gap:20px;
  padding:12px 32px;
  background:rgba(255,255,255,.03);
  border-top:1px solid rgba(255,255,255,.06);
}
.nav-btn{
  height:40px;padding:0 20px;border-radius:10px;
  border:1.5px solid rgba(255,255,255,.08);
  background:rgba(255,255,255,.04);
  color:#fff;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:6px;
  font-family:inherit;font-size:12px;font-weight:700;
  text-transform:uppercase;letter-spacing:.06em;
  transition:all .15s;
}
.nav-btn:hover{background:rgba(94,36,194,.2);border-color:rgba(94,36,194,.4)}
.nav-btn:active{transform:scale(.97)}
.nav-btn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}

.speed-group{display:flex;align-items:center;gap:12px;flex:1;margin:0 12px}
.speed-label{font-size:11px;font-weight:700;color:rgba(255,255,255,.25);white-space:nowrap}
.speed-slider{
  flex:1;max-width:220px;-webkit-appearance:none;appearance:none;
  height:5px;border-radius:3px;
  background:rgba(255,255,255,.1);outline:none;
}
.speed-slider::-webkit-slider-thumb{
  -webkit-appearance:none;appearance:none;
  width:18px;height:18px;border-radius:50%;
  background:#7c3aed;border:2px solid #0d0f13;cursor:pointer;
}
.speed-slider::-moz-range-thumb{
  width:18px;height:18px;border-radius:50%;
  background:#7c3aed;border:2px solid #0d0f13;cursor:pointer;
}
.speed-val{
  min-width:28px;text-align:center;
  font-size:13px;font-weight:800;color:#c4b5fd;
}
.pause-btn{
  width:36px;height:36px;border-radius:10px;
  border:1.5px solid rgba(255,255,255,.1);
  background:rgba(255,255,255,.04);
  color:#fff;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .15s;
}
.pause-btn:hover{background:rgba(94,36,194,.2)}
.pause-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}

.reset-btn{
  width:32px;height:32px;border-radius:8px;
  border:1.5px solid rgba(255,255,255,.1);
  background:rgba(255,255,255,.04);
  color:rgba(255,255,255,.5);cursor:pointer;
  font-size:16px;line-height:1;
  display:flex;align-items:center;justify-content:center;
  transition:background .15s,color .15s;
}
.reset-btn:hover{background:rgba(94,36,194,.2);color:#c4b5fd}

.shortcuts{font-size:11px;color:rgba(255,255,255,.18);white-space:nowrap}
kbd{
  display:inline-block;padding:1px 5px;border-radius:3px;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(255,255,255,.06);
  font-family:inherit;font-size:10px;font-weight:700;color:rgba(255,255,255,.35);
}
</style>
</head>
<body>

<div class="app">
  <!-- Top bar -->
  <div class="topbar">
    <div class="topbar-left">
      <span class="slide-badge" id="badge">1</span>
      <span class="slide-title" id="title">—</span>
    </div>
    <div class="topbar-right">
      <span class="slide-timer" id="slideTimer">0:00</span>
      <button class="reset-btn" id="resetTimer" title="Reset timer (R)">↺</button>
      <div class="status">
        <span class="status-dot" id="dot"></span>
        <span id="status-text">connecting</span>
      </div>
    </div>
  </div>

  <!-- Notes -->
  <div class="notes-scroll" id="scroll">
    <div class="notes-inner" id="inner"></div>
  </div>

  <!-- Bottom bar -->
  <div class="bottom-bar">
    <button class="nav-btn" id="btnPrev"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>Prev</button>
    <button class="nav-btn" id="btnNext">Next<svg viewBox="0 0 24 24"><polyline points="9 6 15 12 9 18"/></svg></button>

    <div class="speed-group">
      <span class="speed-label">SCROLL</span>
      <input type="range" class="speed-slider" id="speed" min="0" max="10" step="1" value="3">
      <span class="speed-val" id="speed-val">3</span>
      <button class="pause-btn" id="pause" title="Space to toggle">
        <svg id="pause-icon" viewBox="0 0 24 24"><line x1="10" y1="6" x2="10" y2="18"/><line x1="14" y1="6" x2="14" y2="18"/></svg>
      </button>
    </div>

    <span class="shortcuts"><kbd>Space</kbd> pause &nbsp; <kbd>↑</kbd><kbd>↓</kbd> speed &nbsp; <kbd>←</kbd><kbd>→</kbd> slides</span>
  </div>
</div>

<script src="notes.js"></script>
<script>
// ═══ NOTES — loaded from shared notes.js, overridden by server-saved edits ═══
let NOTES = Object.assign({}, DEFAULT_NOTES);

// ═══ BUILD NOTE BLOCKS ═══
const innerEl = document.getElementById('inner');
const scrollEl = document.getElementById('scroll');

// ═══ VIEWPORT HIGHLIGHT ═══
const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add('in-view');
    } else {
      entry.target.classList.remove('in-view');
    }
  });
}, { root: scrollEl, threshold: 0.3 });

function buildNoteBlocks() {
  innerEl.innerHTML = '';
  Object.keys(NOTES).forEach(k => {
    const div = document.createElement('div');
    div.className = 'note-block';
    div.id = 'note-' + k;
    div.innerHTML = `<div class="note-num">Slide ${k} — ${TITLES[k] || ''}</div><div class="note-body">${NOTES[k]}</div>`;
    innerEl.appendChild(div);
  });
  // Re-observe for viewport highlighting
  document.querySelectorAll('.note-block').forEach(el => observer.observe(el));
}

// Initial build with defaults
buildNoteBlocks();

// Fetch server-saved notes and rebuild
fetch('/notes').then(r => r.json()).then(saved => {
  if (saved && Object.keys(saved).length) {
    Object.keys(saved).forEach(k => { NOTES[k] = saved[k]; });
    buildNoteBlocks();
  }
}).catch(() => {});

// ═══ STATE ═══
let currentSlide = 1;
let scrollSpeed = 3;
let paused = false;
let scrollRAF = null;
let _syncing = false;
let _lastGoto = 0;  // timestamp of last local goto, to ignore echo

const badgeEl    = document.getElementById('badge');
const titleEl    = document.getElementById('title');
const dotEl      = document.getElementById('dot');
const statusEl   = document.getElementById('status-text');
const speedEl    = document.getElementById('speed');
const speedValEl = document.getElementById('speed-val');
const pauseBtn   = document.getElementById('pause');
const pauseIcon  = document.getElementById('pause-icon');

// ═══ PER-SLIDE TIMER ═══
const SLIDE_BUDGETS = {
  1: 90,   2: 120,  3: 90,   4: 90,   5: 120,
  6: 90,   7: 150,  8: 90,   9: 90,   10: 120,
  11: 120, 12: 90,  13: 120, 14: 120, 15: 60,
  16: 60,  17: 45
};
const DEFAULT_BUDGET = 90;
const slideTimerEl = document.getElementById('slideTimer');
let slideTimerSeconds = 0;
let slideTimerInterval = null;

function formatTime(s) {
  return `${Math.floor(s / 60)}:${String(s % 60).padStart(2, '0')}`;
}

function tickSlideTimer() {
  slideTimerSeconds++;
  const budget = SLIDE_BUDGETS[currentSlide] || DEFAULT_BUDGET;
  slideTimerEl.textContent = formatTime(slideTimerSeconds);
  if (slideTimerSeconds > budget) {
    slideTimerEl.classList.add('over', 'flash');
  } else if (slideTimerSeconds > budget * 0.8) {
    slideTimerEl.classList.add('over');
    slideTimerEl.classList.remove('flash');
  }
}

function resetSlideTimer(broadcast) {
  slideTimerSeconds = 0;
  slideTimerEl.textContent = '0:00';
  slideTimerEl.classList.remove('over', 'flash');
  clearInterval(slideTimerInterval);
  slideTimerInterval = setInterval(tickSlideTimer, 1000);
  if (broadcast) sendCmd('resetTimer');
}

// ═══ SSE ═══
function connectSSE() {
  const es = new EventSource('/sse');
  es.onopen = () => {
    dotEl.classList.add('connected');
    statusEl.textContent = 'connected';
  };
  es.onmessage = (e) => {
    try {
      const d = JSON.parse(e.data);
      console.log('[SSE]', d.type, d.action || '', d.value ?? '');
      if (d.type === 'state') {
        const newSlide = (d.current ?? 0) + 1;
        if (newSlide !== currentSlide) {
          currentSlide = newSlide;
          updateActive();
          scrollToSlide(currentSlide);
          resetSlideTimer();
        }
      } else if (d.type === 'notes') {
        // Live update from presenter.html edits
        Object.keys(d.notes).forEach(k => { NOTES[k] = d.notes[k]; });
        buildNoteBlocks();
        updateActive();
      } else if (d.type === 'cmd') {
        if (d.action === 'goto' && d.index != null) {
          // Ignore echo of our own goto (within 500ms)
          if (Date.now() - _lastGoto < 500) { /* skip own echo */ }
          else {
            const newSlide = d.index + 1;
            currentSlide = newSlide;
            updateActive();
            scrollToSlide(currentSlide);
            resetSlideTimer();
          }
        } else if (d.action === 'speed' && d.value != null) {
          _syncing = true;
          scrollSpeed = d.value;
          speedEl.value = scrollSpeed;
          speedValEl.textContent = scrollSpeed;
          _syncing = false;
          console.log('[SSE] speed applied:', scrollSpeed);
        } else if (d.action === 'pause' && d.value != null) {
          _syncing = true;
          paused = d.value;
          updatePauseIcon();
          _syncing = false;
          console.log('[SSE] pause applied:', paused);
        } else if (d.action === 'scrollpct' && d.value != null) {
          setScrollPct(d.value);
        } else if (d.action === 'resetTimer') {
          resetSlideTimer(false);
        }
      }
    } catch (e) { console.error('[SSE] handler error:', e); }
  };
  es.onerror = () => {
    dotEl.classList.remove('connected');
    statusEl.textContent = 'reconnecting';
  };
}

function updateActive() {
  document.querySelectorAll('.note-block').forEach(el => el.classList.remove('active'));
  const el = document.getElementById('note-' + currentSlide);
  if (el) el.classList.add('active');
  badgeEl.textContent = currentSlide;
  titleEl.textContent = TITLES[currentSlide] || '';
}

let _navJumping = false;

function scrollToSlide(num) {
  const el = document.getElementById('note-' + num);
  if (!el) return;
  paused = true;
  _navJumping = true;
  // Calculate position relative to scroll container content
  const scrollRect = scrollEl.getBoundingClientRect();
  const elRect = el.getBoundingClientRect();
  const targetScroll = scrollEl.scrollTop + (elRect.top - scrollRect.top) - 16;
  scrollEl.scrollTop = Math.max(0, targetScroll);
  broadcastScrollPos();
  setTimeout(() => {
    paused = false;
    updatePauseIcon();
    _navJumping = false;
  }, 300);
}

// ═══ SCROLL POSITION SYNC ═══
let _scrollSyncing = false;
let _scrollThrottle = null;

function getScrollPct() {
  const max = scrollEl.scrollHeight - scrollEl.clientHeight;
  return max > 0 ? scrollEl.scrollTop / max : 0;
}

function setScrollPct(pct) {
  if (_navJumping) return;  // don't override a nav snap
  const max = scrollEl.scrollHeight - scrollEl.clientHeight;
  _scrollSyncing = true;
  scrollEl.scrollTop = pct * max;
  setTimeout(() => { _scrollSyncing = false; }, 100);
}

function broadcastScrollPos() {
  if (_syncing || _scrollSyncing) return;
  sendCmd('scrollpct', undefined, getScrollPct());
}

// ═══ AUTO-SCROLL ═══
let mouseDown = false;
scrollEl.addEventListener('mousedown', () => { mouseDown = true; });
window.addEventListener('mouseup', () => {
  if (mouseDown) broadcastScrollPos();
  mouseDown = false;
});
window.addEventListener('blur', () => { mouseDown = false; });
document.addEventListener('visibilitychange', () => { if (document.hidden) mouseDown = false; });

scrollEl.addEventListener('scroll', () => {
  if (!mouseDown || _scrollSyncing || _syncing) return;
  if (!_scrollThrottle) {
    _scrollThrottle = setTimeout(() => {
      broadcastScrollPos();
      _scrollThrottle = null;
    }, 120);
  }
}, { passive: true });

// Wheel scroll on desktop also syncs
let _wheelActive = false;
let _wheelTimer = null;
scrollEl.addEventListener('wheel', () => {
  _wheelActive = true;
  clearTimeout(_wheelTimer);
  _wheelTimer = setTimeout(() => {
    broadcastScrollPos();
    _wheelActive = false;
  }, 150);
}, { passive: true });

let _autoInterval = null;
function startAutoScroll() {
  if (_autoInterval) clearInterval(_autoInterval);
  if (scrollRAF) cancelAnimationFrame(scrollRAF);
  // Use setInterval at ~60fps; guarantee ≥1 px per tick at any non-zero speed
  _autoInterval = setInterval(() => {
    if (paused || mouseDown || scrollSpeed <= 0) return;
    // speed 1 → 1 px/tick ≈ 60 px/s, speed 10 → 8 px/tick ≈ 500 px/s
    const px = Math.max(1, Math.round(scrollSpeed * 0.83));
    scrollEl.scrollTop += px;
  }, 16);
}

// ═══ SPEED CONTROL ═══
speedEl.addEventListener('input', () => {
  scrollSpeed = parseInt(speedEl.value, 10);
  speedValEl.textContent = scrollSpeed;
  if (!_syncing) sendCmd('speed', undefined, scrollSpeed);
});

// ═══ PAUSE ═══
function updatePauseIcon() {
  if (paused) {
    pauseIcon.innerHTML = '<polygon points="6,4 20,12 6,20" fill="currentColor" stroke="none"/>';
  } else {
    pauseIcon.innerHTML = '<line x1="10" y1="6" x2="10" y2="18"/><line x1="14" y1="6" x2="14" y2="18"/>';
  }
}
pauseBtn.addEventListener('click', () => {
  paused = !paused;
  updatePauseIcon();
  if (!_syncing) sendCmd('pause', undefined, paused);
});

// ═══ SLIDE CONTROLS ═══
function sendCmd(action, index, value) {
  console.log('[sendCmd]', action, index, value);
  fetch(window.location.origin + '/cmd', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action, index, value }),
  }).then(r => { if (!r.ok) console.error('[sendCmd] HTTP', r.status); })
    .catch(e => console.error('[sendCmd] fetch error:', e));
}

function goToCard(num) {
  const total = Object.keys(NOTES).length;
  if (num < 1 || num > total) return;
  currentSlide = num;
  updateActive();
  scrollToSlide(currentSlide);
  resetSlideTimer();
  _lastGoto = Date.now();
  sendCmd('goto', currentSlide - 1);
}

// Next/Prev send 'next'/'prev' commands so deck.html popup substeps on slide 7 work
document.getElementById('btnPrev').addEventListener('click', () => {
  _lastGoto = Date.now();
  sendCmd('prev');
});
document.getElementById('btnNext').addEventListener('click', () => {
  _lastGoto = Date.now();
  sendCmd('next');
});
document.getElementById('resetTimer').addEventListener('click', () => resetSlideTimer(true));

// ═══ KEYBOARD SHORTCUTS ═══
window.addEventListener('keydown', (e) => {
  switch (e.code) {
    case 'Space':
      e.preventDefault();
      paused = !paused;
      updatePauseIcon();
      sendCmd('pause', undefined, paused);
      break;
    case 'ArrowUp':
      e.preventDefault();
      scrollSpeed = Math.min(10, scrollSpeed + 1);
      speedEl.value = scrollSpeed;
      speedValEl.textContent = scrollSpeed;
      sendCmd('speed', undefined, scrollSpeed);
      break;
    case 'ArrowDown':
      e.preventDefault();
      scrollSpeed = Math.max(0, scrollSpeed - 1);
      speedEl.value = scrollSpeed;
      speedValEl.textContent = scrollSpeed;
      sendCmd('speed', undefined, scrollSpeed);
      break;
    case 'KeyR':
      e.preventDefault();
      resetSlideTimer(true);
      break;
    case 'ArrowLeft':
      e.preventDefault();
      _lastGoto = Date.now();
      sendCmd('prev');
      break;
    case 'ArrowRight':
      e.preventDefault();
      _lastGoto = Date.now();
      sendCmd('next');
      break;
  }
});

// ═══ INIT ═══
updateActive();
scrollToSlide(1);
connectSSE();
resetSlideTimer();
startAutoScroll();
</script>
</body>
</html>
